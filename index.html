<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SQL Generate Normalization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-3xl">
        <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">SQL Generator</h2>

        <!-- Nomor Tiket -->
        <div class="mb-4">
            <label class="block font-semibold text-gray-700 mb-1">Nomor Tiket</label>
            <input type="text" id="ticket-number" placeholder="Masukkan nomor tiket..."
                class="border rounded-lg p-2 w-full" autocomplete="off">
        </div>

        <div class="mb-4">
            <label class="block font-semibold text-gray-700 mb-1">Mode Input</label>
            <select id="input-mode" class="border rounded-lg p-2 w-full">
                <option value="manual">Manual</option>
                <option value="excel">Upload Excel</option>
            </select>
        </div>

        <div class="mb-4 rounded-xl border border-gray-200 bg-gray-50 p-4 space-y-2">
            <p class="text-sm font-semibold text-gray-700">Metode tanggal</p>
            <p class="text-xs text-gray-600">Manual: metode dipilih per baris data (bisa campur dalam satu generate). Excel: metode dipilih satu kali untuk semua tanggal file.</p>
        </div>

        <div id="manual-section">
            <div id="input-container" class="space-y-4 mb-4"></div>
        </div>

        <div id="excel-section" class="hidden mb-4 space-y-3">
            <div>
                <label class="block font-semibold text-gray-700 mb-1">Kategori untuk semua tanggal Excel</label>
                <select id="excel-kategori" class="border rounded-lg p-2 w-full"></select>
            </div>
            <div class="flex flex-wrap gap-2">
                <button id="download-template-btn"
                    class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition">Download Template Excel</button>
                <input id="excel-file" type="file" accept=".xlsx,.xls"
                    class="border rounded-lg p-2 flex-1 min-w-[220px] bg-white">
            </div>
            <p class="text-sm text-gray-600">Template minimal: 1 kolom header <code>tanggal</code>. Contoh isi: 2026-04-07</p>
            <div id="excel-status" class="text-sm text-gray-700"></div>
        </div>

        <div class="flex justify-between mb-4">
            <button onclick="addInput()"
                class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">+ Tambah Data</button>
            <button onclick="copyQuery()"
                class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">Copy Query</button>
            <button onclick="exportSQL()"
                class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 transition">Export SQL</button>
        </div>

        <h3 class="font-semibold mb-2 text-gray-700">Generated Query:</h3>
        <div id="query-result" class="bg-gray-200 p-4 rounded-lg min-h-[100px] whitespace-pre-wrap text-gray-700"></div>

        <div class="mt-6 border-t pt-4">
            <div class="flex items-center justify-between mb-2">
                <h3 class="font-semibold text-gray-700">Riwayat Generate</h3>
                <button id="clear-history-btn"
                    class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 transition text-sm">Clear All</button>
            </div>
            <p id="history-empty" class="text-sm text-gray-500">Belum ada riwayat.</p>
            <div id="history-list" class="space-y-2"></div>
        </div>
    </div>

    <script>
        let inputIndex = 0;
        let excelRows = [];
        const HISTORY_STORAGE_KEY = 'sql-generate-normalization-history-v1';
        const HISTORY_MAX_ITEMS = 20;
        let lastSavedSignature = '';
        let isRestoringFromHistory = false;

        // Mapping kategori untuk nama file (rapi)
        const categoryNameMap = {
            "daily": "Daily",
            "mdumtu": "MDU-MTU",
            "pembangkit": "Pembangkit",
            "sktt": "SKTT",
            "sutt": "SUTT",
            "garduinduk": "Gardu-Induk"
        };

        const queryTemplates = {
            "daily": [
                "SELECT * FROM public.dp_fn_generatetransmisibatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generategarduindukbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportcatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepricecatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatebaselinebatchaveragedriver({date});",
                "SELECT * FROM public.dp_fn_generategeneratorbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatemdumtubatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatemdumtubatchbenchmark({date});",
                "SELECT * FROM public.dp_fn_generatepilingbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generategroundtransmisibatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportbatch({date});",
            ],
            "mdumtu": [
                "SELECT * FROM public.dp_fn_generatemdumtubatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatemdumtubatchbenchmark({date});",
                "SELECT * FROM public.dp_fn_generatebaselinebatchaveragedriver({date});",
            ],
            "pembangkit": [
                "SELECT * FROM public.dp_fn_generategeneratorbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportcatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepricecatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepilingbatchnormalization({date});"
            ],
            "sktt": [
                "SELECT * FROM public.dp_fn_generategroundtransmisibatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportcatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepricecatalogbatchnormalization({date});"
            ],
            "sutt": [
                "SELECT * FROM public.dp_fn_generatetransmisibatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportcatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepricecatalogbatchnormalization({date});"
            ],
            "garduinduk": [
                "SELECT * FROM public.dp_fn_generategarduindukbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportcatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepricecatalogbatchnormalization({date});"
            ]
        };

        const inputContainer = document.getElementById('input-container');
        const inputMode = document.getElementById('input-mode');
        const manualSection = document.getElementById('manual-section');
        const excelSection = document.getElementById('excel-section');
        const excelKategori = document.getElementById('excel-kategori');
        const excelFileInput = document.getElementById('excel-file');
        const excelStatus = document.getElementById('excel-status');
        const downloadTemplateBtn = document.getElementById('download-template-btn');
        const queryResult = document.getElementById('query-result');
        const ticketNumberInput = document.getElementById('ticket-number');
        const historyList = document.getElementById('history-list');
        const historyEmpty = document.getElementById('history-empty');
        const clearHistoryBtn = document.getElementById('clear-history-btn');

        function formatDateLocal(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function parseYmdToLocalDate(ymd) {
            const parts = String(ymd).split('-').map(Number);
            if (parts.length !== 3 || parts.some(n => Number.isNaN(n))) return null;
            const d = new Date(parts[0], parts[1] - 1, parts[2]);
            return Number.isNaN(d.getTime()) ? null : d;
        }

        function expandInclusiveDateRange(ymdDari, ymdSampai) {
            const start = parseYmdToLocalDate(ymdDari);
            const end = parseYmdToLocalDate(ymdSampai);
            if (!start || !end || start > end) return [];

            const out = [];
            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                out.push(formatDateLocal(d));
            }
            return out;
        }

        function addDaysYmd(ymd, deltaDays) {
            const base = parseYmdToLocalDate(ymd);
            if (!base) return null;
            base.setDate(base.getDate() + deltaDays);
            return formatDateLocal(base);
        }

        function expandTransactionNeighborhoods(ymdList) {
            const out = [];
            ymdList.forEach((ymd) => {
                const tMinus = addDaysYmd(ymd, -1);
                const tPlus = addDaysYmd(ymd, 1);
                if (tMinus) out.push(tMinus);
                out.push(ymd);
                if (tPlus) out.push(tPlus);
            });
            return out;
        }

        function sortDedupYmd(list) {
            const uniq = Array.from(new Set(list.filter(Boolean)));
            uniq.sort();
            return uniq;
        }

        function mergeDatesForMethodFromYmdList(method, ymdList) {
            if (method === 'excel_pure') {
                return ymdList.filter(Boolean);
            }
            if (method === 'transaksi_baseline') {
                return sortDedupYmd(expandTransactionNeighborhoods(ymdList));
            }
            return sortDedupYmd(ymdList);
        }

        function mergeDatesForMethodFromRanges(method, rangePairs) {
            const raw = [];
            rangePairs.forEach(([dari, sampai]) => {
                raw.push(...expandInclusiveDateRange(dari, sampai));
            });
            return mergeDatesForMethodFromYmdList(method, raw);
        }

        function buildSqlHeaderMeta() {
            const ticket = ticketNumberInput.value.trim();
            const lines = [
                '-- SQL Generate Normalization',
            ];
            if (ticket) lines.push(`-- ticket: ${ticket}`);
            return lines.join('\n');
        }

        function getHistoryItems() {
            try {
                const raw = localStorage.getItem(HISTORY_STORAGE_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch (err) {
                console.warn('Gagal parse history localStorage:', err);
                return [];
            }
        }

        function setHistoryItems(items) {
            localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(items));
        }

        function formatHistoryTime(isoString) {
            const dateObj = new Date(isoString);
            if (Number.isNaN(dateObj.getTime())) return '-';
            return dateObj.toLocaleString('id-ID');
        }

        function renderHistoryList() {
            const items = getHistoryItems();
            historyList.innerHTML = '';
            historyEmpty.classList.toggle('hidden', items.length > 0);

            items.forEach((item) => {
                const wrap = document.createElement('div');
                wrap.className = 'bg-gray-50 border border-gray-200 rounded-lg p-3';

                const ticketText = item.ticket ? `Ticket: ${item.ticket}` : 'Ticket: -';
                const modeText = item.mode === 'excel' ? 'Excel' : 'Manual';
                const categoryText = (item.categories && item.categories.length)
                    ? item.categories.map((cat) => categoryNameMap[cat] || cat).join(', ')
                    : '-';

                wrap.innerHTML = `
                    <div class="text-sm text-gray-700 font-semibold">${ticketText}</div>
                    <div class="text-xs text-gray-600">Mode: ${modeText} | Kategori: ${categoryText}</div>
                    <div class="text-xs text-gray-500 mt-1">${formatHistoryTime(item.createdAt)}</div>
                    <div class="mt-2 flex gap-2">
                        <button data-action="load" data-id="${item.id}" class="bg-blue-500 text-white px-3 py-1 rounded-lg hover:bg-blue-600 transition text-xs">Load</button>
                        <button data-action="delete" data-id="${item.id}" class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 transition text-xs">Hapus</button>
                    </div>
                `;
                historyList.appendChild(wrap);
            });
        }

        function collectManualRows() {
            const rows = [];
            for (let i = 0; i < inputIndex; i++) {
                const metodeInput = document.getElementById(`metode-${i}`);
                const kategoriInput = document.getElementById(`kategori-${i}`);
                const tanggalDariInput = document.getElementById(`tanggal-dari-${i}`);
                const tanggalSampaiInput = document.getElementById(`tanggal-sampai-${i}`);
                if (!metodeInput || !kategoriInput || !tanggalDariInput || !tanggalSampaiInput) continue;

                rows.push({
                    metode: metodeInput.value || '',
                    kategori: kategoriInput.value || '',
                    tanggalDari: tanggalDariInput.value || '',
                    tanggalSampai: tanggalSampaiInput.value || ''
                });
            }
            return rows;
        }

        function getUniqueCategoriesFromState(mode, manualRows, excelCategory) {
            if (mode === 'excel') {
                return excelCategory ? [excelCategory] : [];
            }
            const unique = new Set();
            manualRows.forEach((row) => {
                if (row.kategori) unique.add(row.kategori);
            });
            return Array.from(unique);
        }

        function buildSnapshot() {
            const mode = inputMode.value;
            const manualRows = collectManualRows();
            const categories = getUniqueCategoriesFromState(mode, manualRows, excelKategori.value);
            return {
                ticket: ticketNumberInput.value.trim(),
                mode,
                excelKategori: excelKategori.value || '',
                excelRows: [...excelRows],
                manualRows,
                query: queryResult.innerText,
                categories
            };
        }

        function buildHistorySignature(snapshot) {
            return JSON.stringify({
                mode: snapshot.mode,
                excelKategori: snapshot.excelKategori,
                excelRows: snapshot.excelRows,
                manualRows: snapshot.manualRows,
                categories: snapshot.categories
            });
        }

        function saveCurrentToHistory() {
            if (isRestoringFromHistory) return;
            if (!queryResult.innerText.trim()) return;

            const snapshot = buildSnapshot();
            const signature = buildHistorySignature(snapshot);
            if (signature === lastSavedSignature) return;

            const items = getHistoryItems();
            const filtered = items.filter((item) => item.signature !== signature);

            filtered.unshift({
                id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                createdAt: new Date().toISOString(),
                signature,
                ...snapshot
            });

            const trimmed = filtered.slice(0, HISTORY_MAX_ITEMS);
            setHistoryItems(trimmed);
            lastSavedSignature = signature;
            renderHistoryList();
        }

        function clearAllInputs() {
            inputContainer.innerHTML = '';
            inputIndex = 0;
        }

        function applyManualRows(rows) {
            clearAllInputs();
            const sourceRows = rows && rows.length ? rows : [{}];

            sourceRows.forEach((row) => {
                addInput();
                const idx = inputIndex - 1;
                const metodeInput = document.getElementById(`metode-${idx}`);
                const kategoriInput = document.getElementById(`kategori-${idx}`);
                const tanggalDariInput = document.getElementById(`tanggal-dari-${idx}`);
                const tanggalSampaiInput = document.getElementById(`tanggal-sampai-${idx}`);

                if (metodeInput && row.metode) metodeInput.value = row.metode;
                if (kategoriInput && row.kategori) kategoriInput.value = row.kategori;
                if (metodeInput) metodeInput.dispatchEvent(new Event('change'));
                if (tanggalDariInput && row.tanggalDari) {
                    tanggalDariInput.value = row.tanggalDari;
                    tanggalDariInput.dispatchEvent(new Event('change'));
                }
                if (tanggalSampaiInput && row.tanggalSampai && !tanggalSampaiInput.disabled) {
                    tanggalSampaiInput.value = row.tanggalSampai;
                    tanggalSampaiInput.dispatchEvent(new Event('change'));
                }
            });
        }

        function loadHistoryById(id) {
            const items = getHistoryItems();
            const selected = items.find((item) => item.id === id);
            if (!selected) return;

            isRestoringFromHistory = true;
            ticketNumberInput.value = selected.ticket || '';
            inputMode.value = selected.mode === 'excel' ? 'excel' : 'manual';
            setModeUI();

            excelKategori.value = selected.excelKategori || '';
            excelRows = Array.isArray(selected.excelRows) ? [...selected.excelRows] : [];
            excelStatus.textContent = selected.mode === 'excel'
                ? `Data riwayat dimuat. Jumlah tanggal: ${excelRows.length}`
                : '';

            if (selected.mode === 'manual') {
                applyManualRows(Array.isArray(selected.manualRows) ? selected.manualRows : []);
            } else {
                clearAllInputs();
                addInput();
            }

            updateQuery();
            lastSavedSignature = selected.signature || JSON.stringify(buildSnapshot());
            isRestoringFromHistory = false;
        }

        function deleteHistoryById(id) {
            const items = getHistoryItems();
            const next = items.filter((item) => item.id !== id);
            setHistoryItems(next);
            renderHistoryList();
        }

        function normalizeExcelDate(value) {
            if (value === null || value === undefined || value === '') return null;

            if (value instanceof Date && !Number.isNaN(value.getTime())) {
                return formatDateLocal(value);
            }

            if (typeof value === 'number') {
                const parsed = XLSX.SSF.parse_date_code(value);
                if (!parsed) return null;
                const dateObj = new Date(parsed.y, parsed.m - 1, parsed.d);
                if (Number.isNaN(dateObj.getTime())) return null;
                return formatDateLocal(dateObj);
            }

            if (typeof value === 'string') {
                const clean = value.trim();
                if (!clean) return null;

                const isoDateMatch = clean.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
                if (isoDateMatch) {
                    const yyyy = Number(isoDateMatch[1]);
                    const mm = Number(isoDateMatch[2]);
                    const dd = Number(isoDateMatch[3]);
                    const dateObj = new Date(yyyy, mm - 1, dd);
                    if (!Number.isNaN(dateObj.getTime())) {
                        return formatDateLocal(dateObj);
                    }
                }

                // dd/mm/yyyy or dd-mm-yyyy
                const slashMatch = clean.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
                if (slashMatch) {
                    const dd = Number(slashMatch[1]);
                    const mm = Number(slashMatch[2]);
                    const yyyy = Number(slashMatch[3]);
                    const dateObj = new Date(yyyy, mm - 1, dd);
                    if (!Number.isNaN(dateObj.getTime())) {
                        return formatDateLocal(dateObj);
                    }
                }

                // Fallback for textual date values, e.g. "5 March 2026"
                const direct = new Date(clean);
                if (!Number.isNaN(direct.getTime())) {
                    return formatDateLocal(direct);
                }
            }

            return null;
        }

        function buildDatedQueriesForCategory(kategori, dateList) {
            const templates = queryTemplates[kategori] || [];
            const groupQueries = [];

            dateList.forEach((tanggalFormatted) => {
                const queriesPerDate = templates
                    .map(template => template.replace(`{date}`, `'${tanggalFormatted}'`))
                    .join('\n');
                groupQueries.push(queriesPerDate);
            });
            return groupQueries.join('\n\n');
        }

        function buildDefaultNoDateBlockForCategory(kategori) {
            const templates = queryTemplates[kategori] || [];
            return templates
                .map(template => template.replace(/\{date\}/g, ""))
                .join('\n');
        }
        
        function populateCategorySelect(selectEl) {
            selectEl.innerHTML = '';
            for (const key in queryTemplates) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = categoryNameMap[key] || key;
                selectEl.appendChild(option);
            }
        }

        function setModeUI() {
            const mode = inputMode.value;
            const isManual = mode === 'manual';
            manualSection.classList.toggle('hidden', !isManual);
            excelSection.classList.toggle('hidden', isManual);
            updateQuery();
        }


        function addInput() {
            const inputGroup = document.createElement('div');
            inputGroup.className = 'input-row grid grid-cols-1 lg:grid-cols-[1fr_1fr_auto_auto_auto] gap-3 items-center';

            inputGroup.innerHTML = `
                            <div class="space-y-1">
                                <label class="block text-xs font-semibold text-gray-600">Metode Tanggal</label>
                                <select id="metode-${inputIndex}" class="border rounded-lg p-2 w-full"></select>
                            </div>
                            <div class="space-y-1">
                                <label class="block text-xs font-semibold text-gray-600">Kategori</label>
                                <select id="kategori-${inputIndex}" class="border rounded-lg p-2 w-full"></select>
                            </div>
                            <div class="space-y-1">
                                <label id="label-tanggal-dari-${inputIndex}" class="block text-xs font-semibold text-gray-600">Tanggal Dari</label>
                                <input type="date" id="tanggal-dari-${inputIndex}" class="border rounded-lg p-2 w-full lg:min-w-[160px]">
                            </div>
                            <div id="container-tanggal-sampai-${inputIndex}" class="space-y-1">
                                <label id="label-tanggal-sampai-${inputIndex}" class="block text-xs font-semibold text-gray-600">Tanggal Sampai</label>
                                <input type="date" id="tanggal-sampai-${inputIndex}" class="border rounded-lg p-2 w-full lg:min-w-[160px]" disabled>
                            </div>
                            <div class="space-y-1">
                                <label class="block text-xs font-semibold text-gray-600">Aksi</label>
                                <button onclick="removeInput(this)" class="bg-red-500 text-white px-3 py-2 rounded-lg hover:bg-red-600 transition w-full lg:w-auto">Hapus</button>
                            </div>
            `;

            const metodeSelect = inputGroup.querySelector(`#metode-${inputIndex}`);
            const select = inputGroup.querySelector(`#kategori-${inputIndex}`);
            const tanggalDariInput = inputGroup.querySelector(`#tanggal-dari-${inputIndex}`);
            const tanggalSampaiInput = inputGroup.querySelector(`#tanggal-sampai-${inputIndex}`);
            const labelTanggalDari = inputGroup.querySelector(`#label-tanggal-dari-${inputIndex}`);
            const containerTanggalSampai = inputGroup.querySelector(`#container-tanggal-sampai-${inputIndex}`);

            [
                { value: 'baseline_dibuat', label: 'tanggal baseline dibuat' },
                { value: 'transaksi_baseline', label: 'tanggal tranksaksi baseline' }
            ].forEach((item) => {
                const option = document.createElement('option');
                option.value = item.value;
                option.textContent = item.label;
                metodeSelect.appendChild(option);
            });

            // Populate kategori options
            for (const key in queryTemplates) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = categoryNameMap[key] || key;
                select.appendChild(option);
            }

            function syncRowDateFieldsByMethod() {
                const isTransaksi = metodeSelect.value === 'transaksi_baseline';
                if (isTransaksi) {
                    labelTanggalDari.textContent = 'Tanggal Transaksi';
                    containerTanggalSampai.classList.add('hidden');
                    tanggalSampaiInput.disabled = true;
                    tanggalSampaiInput.min = tanggalDariInput.value || '';
                    tanggalSampaiInput.value = tanggalDariInput.value || '';
                } else {
                    labelTanggalDari.textContent = 'Tanggal Dari';
                    containerTanggalSampai.classList.remove('hidden');
                    if (tanggalDariInput.value) {
                        tanggalSampaiInput.disabled = false;
                        tanggalSampaiInput.min = tanggalDariInput.value;
                        if (!tanggalSampaiInput.value || tanggalSampaiInput.value < tanggalDariInput.value) {
                            tanggalSampaiInput.value = tanggalDariInput.value;
                        }
                    } else {
                        tanggalSampaiInput.disabled = true;
                        tanggalSampaiInput.value = '';
                        tanggalSampaiInput.min = '';
                    }
                }
            }

            // Event listener untuk tanggal dari
            tanggalDariInput.addEventListener('change', function () {
                if (metodeSelect.value === 'transaksi_baseline') {
                    syncRowDateFieldsByMethod();
                    updateQuery();
                    return;
                }

                if (this.value) {
                    // Enable tanggal sampai
                    tanggalSampaiInput.disabled = false;

                    // Set min date untuk tanggal sampai = tanggal dari
                    tanggalSampaiInput.min = this.value;

                    // Reset tanggal sampai jika nilainya sebelum tanggal dari
                    if (tanggalSampaiInput.value && tanggalSampaiInput.value < this.value) {
                        tanggalSampaiInput.value = '';
                    }
                } else {
                    // Jika tanggal dari dihapus, disable tanggal sampai
                    tanggalSampaiInput.disabled = true;
                    tanggalSampaiInput.value = '';
                    tanggalSampaiInput.min = '';
                }

                updateQuery();
            });

            // Event listener untuk tanggal sampai
            tanggalSampaiInput.addEventListener('change', function () {
                updateQuery();
            });

            // Event listener untuk kategori
            select.addEventListener('change', function () {
                updateQuery();
            });
            metodeSelect.addEventListener('change', function () {
                syncRowDateFieldsByMethod();
                updateQuery();
            });

            syncRowDateFieldsByMethod();
            inputContainer.appendChild(inputGroup);
            inputIndex++;
            updateQuery();
        }

        function removeInput(button) {
            const row = button.closest('.input-row');
            if (row) row.remove();
            updateQuery();
        }

        function updateQuery() {
            const categoryMethodToDates = new Map();

            if (inputMode.value === 'excel') {
                if (excelRows.length > 0 && excelKategori.value) {
                    const method = 'excel_pure';
                    const key = `${excelKategori.value}::${method}`;
                    const merged = mergeDatesForMethodFromYmdList(method, excelRows);
                    categoryMethodToDates.set(key, {
                        kategori: excelKategori.value,
                        method,
                        dates: merged
                    });
                }
            } else {
                const categoryMethodRanges = new Map();

                for (let i = 0; i < inputIndex; i++) {
                    const metodeInput = document.getElementById(`metode-${i}`);
                    const kategoriInput = document.getElementById(`kategori-${i}`);
                    const tanggalDariInput = document.getElementById(`tanggal-dari-${i}`);
                    const tanggalSampaiInput = document.getElementById(`tanggal-sampai-${i}`);

                    if (metodeInput && kategoriInput && tanggalDariInput && tanggalSampaiInput && tanggalDariInput.value && tanggalSampaiInput.value) {
                        const method = metodeInput.value;
                        const kategori = kategoriInput.value;
                        const key = `${kategori}::${method}`;
                        if (!categoryMethodRanges.has(key)) {
                            categoryMethodRanges.set(key, { kategori, method, ranges: [] });
                        }
                        categoryMethodRanges.get(key).ranges.push([tanggalDariInput.value, tanggalSampaiInput.value]);
                    }
                }

                categoryMethodRanges.forEach((item, key) => {
                    categoryMethodToDates.set(key, {
                        kategori: item.kategori,
                        method: item.method,
                        dates: mergeDatesForMethodFromRanges(item.method, item.ranges)
                    });
                });
            }

            const bodyParts = [];
            const categoriesInOrder = new Set();

            categoryMethodToDates.forEach((item) => {
                if (!item.dates.length) return;
                categoriesInOrder.add(item.kategori);
                const methodLabel = item.method === 'transaksi_baseline'
                    ? 'Tanggal Transaksi Baseline'
                    : item.method === 'baseline_dibuat'
                        ? 'Tanggal Baseline Dibuat'
                        : 'Tanggal Input Excel';
                bodyParts.push(`-- ${methodLabel}\n` + buildDatedQueriesForCategory(item.kategori, item.dates));
            });

            if (bodyParts.length === 0) {
                queryResult.innerText = '';
                return;
            }

            const defaultParts = Array.from(categoriesInOrder).map((kategori) => {
                const block = buildDefaultNoDateBlockForCategory(kategori);
                return `-- Query Default untuk ${kategori} akan mengambil -2 hari dari tanggal eksekusi query.\n${block}`;
            });

            const finalQuery =
                'BEGIN;\n\n' +
                buildSqlHeaderMeta() +
                '\n\n' +
                bodyParts.join('\n\n\n') +
                '\n\n' +
                defaultParts.join('\n\n') +
                '\n\nCOMMIT;';

            queryResult.innerText = finalQuery;
        }

        inputContainer.addEventListener('input', updateQuery);
        ticketNumberInput.addEventListener('input', updateQuery);
        inputMode.addEventListener('change', setModeUI);
        excelKategori.addEventListener('change', updateQuery);
        clearHistoryBtn.addEventListener('click', function () {
            const ok = confirm('Hapus semua riwayat generate?');
            if (!ok) return;
            setHistoryItems([]);
            renderHistoryList();
        });

        historyList.addEventListener('click', function (event) {
            const target = event.target.closest('button[data-action]');
            if (!target) return;

            const action = target.getAttribute('data-action');
            const id = target.getAttribute('data-id');
            if (!id) return;

            if (action === 'load') {
                loadHistoryById(id);
            } else if (action === 'delete') {
                deleteHistoryById(id);
            }
        });

        excelFileInput.addEventListener('change', async function (event) {
            const file = event.target.files && event.target.files[0];
            excelRows = [];
            excelStatus.textContent = '';
            updateQuery();

            if (!file) return;

            try {
                const buffer = await file.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array', cellDates: false });
                const firstSheetName = workbook.SheetNames[0];
                if (!firstSheetName) {
                    excelStatus.textContent = 'File tidak memiliki sheet.';
                    return;
                }

                const sheet = workbook.Sheets[firstSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, {
                    header: 1,
                    raw: true,
                    defval: ''
                });

                if (!rows.length) {
                    excelStatus.textContent = 'Sheet kosong.';
                    return;
                }

                const headerRow = (rows[0] || []).map(h => String(h).trim().toLowerCase());
                const dateColIndex = headerRow.findIndex(h => h === 'tanggal');
                if (dateColIndex === -1) {
                    excelStatus.textContent = 'Header wajib punya kolom "tanggal".';
                    return;
                }

                const invalidRows = [];
                const validDates = [];

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const rawDateValue = row[dateColIndex];
                    if (rawDateValue === '' || rawDateValue === null || rawDateValue === undefined) {
                        continue;
                    }

                    const normalized = normalizeExcelDate(rawDateValue);
                    if (normalized) {
                        validDates.push(normalized);
                    } else {
                        invalidRows.push(i + 1);
                    }
                }

                excelRows = validDates;
                const validCount = validDates.length;
                const invalidCount = invalidRows.length;
                excelStatus.textContent = `Upload berhasil. Valid: ${validCount}, Invalid: ${invalidCount}${invalidCount ? ` (baris: ${invalidRows.join(', ')})` : ''}`;
                updateQuery();
            } catch (err) {
                excelStatus.textContent = `Gagal membaca file Excel: ${err.message || err}`;
                excelRows = [];
                updateQuery();
            }
        });

        downloadTemplateBtn.addEventListener('click', function () {
            const ws = XLSX.utils.aoa_to_sheet([
                ['tanggal'],
                ['2026-04-07'],
                ['2026-04-08']
            ]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Template');
            XLSX.writeFile(wb, 'template_tanggal_sql_generator.xlsx');
        });

        async function copyQuery() {
            if (queryResult.innerText.trim() === '') {
                alert('Tidak ada query untuk disalin!');
                return;
            }
            try {
                await navigator.clipboard.writeText(queryResult.innerText);
                saveCurrentToHistory();
                alert('Query berhasil dicopy!');
            } catch (err) {
                alert(`Gagal copy query: ${err.message || err}`);
            }
        }

        function exportSQL() {
            const ticket = ticketNumberInput.value.trim();

            if (!ticket) {
                alert('Nomor tiket wajib diisi!');
                return;
            }

            if (queryResult.innerText.trim() === '') {
                alert('Tidak ada query untuk di-export!');
                return;
            }

            allCategoryEl = [];
            catName = [];
            catKey = [];

            if (inputMode.value === 'excel') {
                if (!excelKategori.value) {
                    alert('Kategori belum dipilih!');
                    return;
                }
                allCategoryEl = [excelKategori.value];
                catName = [categoryNameMap[excelKategori.value] || excelKategori.value];
                catKey = [excelKategori.value];
            } else {
                const firstCategoryEl = document.getElementById("kategori-0");

                if (!firstCategoryEl) {
                    alert('Kategori belum diisi!');
                    return;
                } else if (inputIndex > 1) {
                    for (let i = 0; i < inputIndex; i++) {
                        const catElement = document.getElementById(`kategori-${i}`);
                        if (catElement) {
                            const cat = catElement.value.trim();
                            if (cat) {
                                allCategoryEl.push(cat);
                            }
                        }
                    }

                    catName = allCategoryEl.map(cat => categoryNameMap[cat] || cat);
                    catKey = [...allCategoryEl];
                } else {
                    let categoryKey = firstCategoryEl.value.trim();
                    let categoryName = categoryNameMap[categoryKey] || categoryKey;
                    catName = [categoryName];
                    catKey = [categoryKey];
                }
            }

            const categoryString = catName.length > 1 ?
                catName.join('_') :
                catName[0];

            const filename = `Batch Job Baseline_${categoryString}_${ticket}.sql`;
            console.log("Generated Filename:", filename);

            const queryText = queryResult.innerText;

            const blob = new Blob([queryText], { type: 'text/sql' });

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;

            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            URL.revokeObjectURL(url);
            saveCurrentToHistory();
        }

        populateCategorySelect(excelKategori);
        renderHistoryList();
        setModeUI();
        addInput();
        updateQuery();
    </script>

</body>

</html>
