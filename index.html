<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SQL Generate Normalization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-2xl">
        <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">SQL Generator</h2>

        <!-- Nomor Tiket -->
        <div class="mb-4">
            <label class="block font-semibold text-gray-700 mb-1">Nomor Tiket</label>
            <input type="text" id="ticket-number" placeholder="Masukkan nomor tiket..."
                class="border rounded-lg p-2 w-full" autocomplete="off">
        </div>

        <div class="mb-4">
            <label class="block font-semibold text-gray-700 mb-1">Mode Input</label>
            <select id="input-mode" class="border rounded-lg p-2 w-full">
                <option value="manual">Manual</option>
                <option value="excel">Upload Excel</option>
            </select>
        </div>

        <div id="manual-section">
            <div id="input-container" class="space-y-4 mb-4"></div>
        </div>

        <div id="excel-section" class="hidden mb-4 space-y-3">
            <div>
                <label class="block font-semibold text-gray-700 mb-1">Kategori untuk semua tanggal Excel</label>
                <select id="excel-kategori" class="border rounded-lg p-2 w-full"></select>
            </div>
            <div class="flex flex-wrap gap-2">
                <button id="download-template-btn"
                    class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition">Download Template Excel</button>
                <input id="excel-file" type="file" accept=".xlsx,.xls"
                    class="border rounded-lg p-2 flex-1 min-w-[220px] bg-white">
            </div>
            <p class="text-sm text-gray-600">Template minimal: 1 kolom header <code>tanggal</code>. Contoh isi: 2026-04-07</p>
            <div id="excel-status" class="text-sm text-gray-700"></div>
        </div>

        <div class="flex justify-between mb-4">
            <button onclick="addInput()"
                class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">+ Tambah Data</button>
            <button onclick="copyQuery()"
                class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">Copy Query</button>
            <button onclick="exportSQL()"
                class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 transition">Export SQL</button>
        </div>

        <h3 class="font-semibold mb-2 text-gray-700">Generated Query:</h3>
        <div id="query-result" class="bg-gray-200 p-4 rounded-lg min-h-[100px] whitespace-pre-wrap text-gray-700"></div>
    </div>

    <script>
        let inputIndex = 0;
        let excelRows = [];

        // Mapping kategori untuk nama file (rapi)
        const categoryNameMap = {
            "daily": "Daily",
            "mdumtu": "MDU-MTU",
            "pembangkit": "Pembangkit",
            "sktt": "SKTT",
            "sutt": "SUTT",
            "garduinduk": "Gardu-Induk"
        };

        const queryTemplates = {
            "daily": [
                "SELECT * FROM public.dp_fn_generatetransmisibatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generategarduindukbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportcatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepricecatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatebaselinebatchaveragedriver({date});",
                "SELECT * FROM public.dp_fn_generategeneratorbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatemdumtubatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatemdumtubatchbenchmark({date});",
                "SELECT * FROM public.dp_fn_generatepilingbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generategroundtransmisibatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportbatch({date});",
            ],
            "mdumtu": [
                "SELECT * FROM public.dp_fn_generatemdumtubatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatemdumtubatchbenchmark({date});",
                "SELECT * FROM public.dp_fn_generatebaselinebatchaveragedriver({date});",
            ],
            "pembangkit": [
                "SELECT * FROM public.dp_fn_generategeneratorbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportcatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepricecatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepilingbatchnormalization({date});"
            ],
            "sktt": [
                "SELECT * FROM public.dp_fn_generategroundtransmisibatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportcatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepricecatalogbatchnormalization({date});"
            ],
            "sutt": [
                "SELECT * FROM public.dp_fn_generatetransmisibatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportcatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepricecatalogbatchnormalization({date});"
            ],
            "garduinduk": [
                "SELECT * FROM public.dp_fn_generategarduindukbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatetransportcatalogbatchnormalization({date});",
                "SELECT * FROM public.dp_fn_generatepricecatalogbatchnormalization({date});"
            ]
        };

        const inputContainer = document.getElementById('input-container');
        const inputMode = document.getElementById('input-mode');
        const manualSection = document.getElementById('manual-section');
        const excelSection = document.getElementById('excel-section');
        const excelKategori = document.getElementById('excel-kategori');
        const excelFileInput = document.getElementById('excel-file');
        const excelStatus = document.getElementById('excel-status');
        const downloadTemplateBtn = document.getElementById('download-template-btn');
        const queryResult = document.getElementById('query-result');

        function formatDateLocal(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function normalizeExcelDate(value) {
            if (value === null || value === undefined || value === '') return null;

            if (value instanceof Date && !Number.isNaN(value.getTime())) {
                return formatDateLocal(value);
            }

            if (typeof value === 'number') {
                const parsed = XLSX.SSF.parse_date_code(value);
                if (!parsed) return null;
                const dateObj = new Date(parsed.y, parsed.m - 1, parsed.d);
                if (Number.isNaN(dateObj.getTime())) return null;
                return formatDateLocal(dateObj);
            }

            if (typeof value === 'string') {
                const clean = value.trim();
                if (!clean) return null;

                const isoDateMatch = clean.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
                if (isoDateMatch) {
                    const yyyy = Number(isoDateMatch[1]);
                    const mm = Number(isoDateMatch[2]);
                    const dd = Number(isoDateMatch[3]);
                    const dateObj = new Date(yyyy, mm - 1, dd);
                    if (!Number.isNaN(dateObj.getTime())) {
                        return formatDateLocal(dateObj);
                    }
                }

                // dd/mm/yyyy or dd-mm-yyyy
                const slashMatch = clean.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
                if (slashMatch) {
                    const dd = Number(slashMatch[1]);
                    const mm = Number(slashMatch[2]);
                    const yyyy = Number(slashMatch[3]);
                    const dateObj = new Date(yyyy, mm - 1, dd);
                    if (!Number.isNaN(dateObj.getTime())) {
                        return formatDateLocal(dateObj);
                    }
                }

                // Fallback for textual date values, e.g. "5 March 2026"
                const direct = new Date(clean);
                if (!Number.isNaN(direct.getTime())) {
                    return formatDateLocal(direct);
                }
            }

            return null;
        }

        function buildQueryForCategoryDates(kategori, dateList) {
            const templates = queryTemplates[kategori] || [];
            const groupQueries = [];

            dateList.forEach((tanggalFormatted) => {
                const queriesPerDate = templates
                    .map(template => template.replace(`{date}`, `'${tanggalFormatted}'`))
                    .join('\n');
                groupQueries.push(queriesPerDate);
            });

            const emptyQuery = templates
                .map(template => template.replace(/\{date\}/g, ""))
                .join('\n');

            const notes = `\n\n-- Query Default untuk ${kategori} akan mengambil -2 hari dari tanggal eksekusi query.`;
            return groupQueries.join('\n\n') + notes + '\n' + emptyQuery;
        }

        function populateCategorySelect(selectEl) {
            selectEl.innerHTML = '';
            for (const key in queryTemplates) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = categoryNameMap[key] || key;
                selectEl.appendChild(option);
            }
        }

        function setModeUI() {
            const mode = inputMode.value;
            const isManual = mode === 'manual';
            manualSection.classList.toggle('hidden', !isManual);
            excelSection.classList.toggle('hidden', isManual);
            updateQuery();
        }


        function addInput() {
            const inputGroup = document.createElement('div');
            inputGroup.className = 'flex items-center space-x-4';

            inputGroup.innerHTML = `
                            <select id="kategori-${inputIndex}" class="border rounded-lg p-2 flex-1"></select>
                            <input type="date" id="tanggal-dari-${inputIndex}" class="border rounded-lg p-2">
                            <span>-</span>
                            <input type="date" id="tanggal-sampai-${inputIndex}" class="border rounded-lg p-2" disabled>
                            <button onclick="removeInput(this)" class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 transition">Hapus</button>
            `;

            const select = inputGroup.querySelector(`#kategori-${inputIndex}`);
            const tanggalDariInput = inputGroup.querySelector(`#tanggal-dari-${inputIndex}`);
            const tanggalSampaiInput = inputGroup.querySelector(`#tanggal-sampai-${inputIndex}`);

            // Populate kategori options
            for (const key in queryTemplates) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = categoryNameMap[key] || key;
                select.appendChild(option);
            }

            // Event listener untuk tanggal dari
            tanggalDariInput.addEventListener('change', function () {
                if (this.value) {
                    // Enable tanggal sampai
                    tanggalSampaiInput.disabled = false;

                    // Set min date untuk tanggal sampai = tanggal dari
                    tanggalSampaiInput.min = this.value;

                    // Reset tanggal sampai jika nilainya sebelum tanggal dari
                    if (tanggalSampaiInput.value && tanggalSampaiInput.value < this.value) {
                        tanggalSampaiInput.value = '';
                    }
                } else {
                    // Jika tanggal dari dihapus, disable tanggal sampai
                    tanggalSampaiInput.disabled = true;
                    tanggalSampaiInput.value = '';
                    tanggalSampaiInput.min = '';
                }

                updateQuery();
            });

            // Event listener untuk tanggal sampai
            tanggalSampaiInput.addEventListener('change', function () {
                updateQuery();
            });

            // Event listener untuk kategori
            select.addEventListener('change', function () {
                updateQuery();
            });

            inputContainer.appendChild(inputGroup);
            inputIndex++;
            updateQuery();
        }

        function removeInput(button) {
            button.parentElement.remove();
            updateQuery();
        }

        function updateQuery() {
            const queryGroups = [];

            if (inputMode.value === 'excel') {
                if (excelRows.length > 0 && excelKategori.value) {
                    queryGroups.push(buildQueryForCategoryDates(excelKategori.value, excelRows));
                }
            } else {
                for (let i = 0; i < inputIndex; i++) {
                    const kategoriInput = document.getElementById(`kategori-${i}`);
                    const tanggalDariInput = document.getElementById(`tanggal-dari-${i}`);
                    const tanggalSampaiInput = document.getElementById(`tanggal-sampai-${i}`);

                    if (kategoriInput && tanggalDariInput && tanggalSampaiInput && tanggalDariInput.value && tanggalSampaiInput.value) {
                        const kategori = kategoriInput.value;
                        const dariParts = tanggalDariInput.value.split('-').map(Number);
                        const sampaiParts = tanggalSampaiInput.value.split('-').map(Number);
                        const tanggalDari = new Date(dariParts[0], dariParts[1] - 1, dariParts[2]);
                        const tanggalSampai = new Date(sampaiParts[0], sampaiParts[1] - 1, sampaiParts[2]);
                        const dateList = [];

                        for (let d = new Date(tanggalDari); d <= tanggalSampai; d.setDate(d.getDate() + 1)) {
                            dateList.push(formatDateLocal(d));
                        }

                        queryGroups.push(buildQueryForCategoryDates(kategori, dateList));
                    }
                }
            }

            if (queryGroups.length > 0) {
                const finalQuery = 'BEGIN;\n\n' + queryGroups.join('\n\n\n') + '\n\nCOMMIT;';
                queryResult.innerText = finalQuery;
            } else {
                queryResult.innerText = '';
            }
        }

        inputContainer.addEventListener('input', updateQuery);
        inputMode.addEventListener('change', setModeUI);
        excelKategori.addEventListener('change', updateQuery);

        excelFileInput.addEventListener('change', async function (event) {
            const file = event.target.files && event.target.files[0];
            excelRows = [];
            excelStatus.textContent = '';
            updateQuery();

            if (!file) return;

            try {
                const buffer = await file.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array', cellDates: false });
                const firstSheetName = workbook.SheetNames[0];
                if (!firstSheetName) {
                    excelStatus.textContent = 'File tidak memiliki sheet.';
                    return;
                }

                const sheet = workbook.Sheets[firstSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, {
                    header: 1,
                    raw: true,
                    defval: ''
                });

                if (!rows.length) {
                    excelStatus.textContent = 'Sheet kosong.';
                    return;
                }

                const headerRow = (rows[0] || []).map(h => String(h).trim().toLowerCase());
                const dateColIndex = headerRow.findIndex(h => h === 'tanggal');
                if (dateColIndex === -1) {
                    excelStatus.textContent = 'Header wajib punya kolom "tanggal".';
                    return;
                }

                const invalidRows = [];
                const validDates = [];

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const rawDateValue = row[dateColIndex];
                    if (rawDateValue === '' || rawDateValue === null || rawDateValue === undefined) {
                        continue;
                    }

                    const normalized = normalizeExcelDate(rawDateValue);
                    if (normalized) {
                        validDates.push(normalized);
                    } else {
                        invalidRows.push(i + 1);
                    }
                }

                excelRows = validDates;
                const validCount = validDates.length;
                const invalidCount = invalidRows.length;
                excelStatus.textContent = `Upload berhasil. Valid: ${validCount}, Invalid: ${invalidCount}${invalidCount ? ` (baris: ${invalidRows.join(', ')})` : ''}`;
                updateQuery();
            } catch (err) {
                excelStatus.textContent = `Gagal membaca file Excel: ${err.message || err}`;
                excelRows = [];
                updateQuery();
            }
        });

        downloadTemplateBtn.addEventListener('click', function () {
            const ws = XLSX.utils.aoa_to_sheet([
                ['tanggal'],
                ['2026-04-07'],
                ['2026-04-08']
            ]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Template');
            XLSX.writeFile(wb, 'template_tanggal_sql_generator.xlsx');
        });

        function copyQuery() {
            if (queryResult.innerText.trim() === '') {
                alert('Tidak ada query untuk disalin!');
                return;
            }
            navigator.clipboard.writeText(queryResult.innerText);
            alert('Query berhasil dicopy!');
        }

        function exportSQL() {
            const ticket = document.getElementById('ticket-number').value.trim();

            if (!ticket) {
                alert('Nomor tiket wajib diisi!');
                return;
            }

            if (queryResult.innerText.trim() === '') {
                alert('Tidak ada query untuk di-export!');
                return;
            }

            allCategoryEl = [];
            catName = [];
            catKey = [];

            if (inputMode.value === 'excel') {
                if (!excelKategori.value) {
                    alert('Kategori belum dipilih!');
                    return;
                }
                allCategoryEl = [excelKategori.value];
                catName = [categoryNameMap[excelKategori.value] || excelKategori.value];
                catKey = [excelKategori.value];
            } else {
                const firstCategoryEl = document.getElementById("kategori-0");

                if (!firstCategoryEl) {
                    alert('Kategori belum diisi!');
                    return;
                } else if (inputIndex > 1) {
                    for (let i = 0; i < inputIndex; i++) {
                        const catElement = document.getElementById(`kategori-${i}`);
                        if (catElement) {
                            const cat = catElement.value.trim();
                            if (cat) {
                                allCategoryEl.push(cat);
                            }
                        }
                    }

                    catName = allCategoryEl.map(cat => categoryNameMap[cat] || cat);
                    catKey = [...allCategoryEl];
                } else {
                    let categoryKey = firstCategoryEl.value.trim();
                    let categoryName = categoryNameMap[categoryKey] || categoryKey;
                    catName = [categoryName];
                    catKey = [categoryKey];
                }
            }

            const categoryString = catName.length > 1 ?
                catName.join('_') :
                catName[0];

            const filename = `Batch Job Baseline_${categoryString}_${ticket}.sql`;
            console.log("Generated Filename:", filename);

            const queryText = queryResult.innerText;

            const blob = new Blob([queryText], { type: 'text/sql' });

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;

            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            URL.revokeObjectURL(url);
        }

        populateCategorySelect(excelKategori);
        setModeUI();
        addInput();
    </script>

</body>

</html>
